<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Quiz Geografia — UDA 2 (1–75)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>Quiz Geografia — UDA 2</h1>
  <div class="sub">Demografia · Migrazioni · Città · 75 domande</div>
</header>

<div class="container">
  <div class="bar">
    <span class="pill">Timer: <strong id="timer">00:00</strong></span>
    <span class="pill">Punteggio: <strong id="score">0</strong>/<span id="total">0</span></span>

    <button class="primary" id="startBtn">Avvia</button>
    <button id="finishBtn">Fine &amp; Voto</button>
    <button class="danger" id="restartBtn">Ricomincia</button>
    <button id="modeBtn">Modalità: Allenamento</button>
  </div>

  <div class="row">
    <div class="left box">
      <strong>Indice domande</strong>
      <div class="muted" style="margin:6px 0 8px;">Tocca un numero per andare alla domanda.</div>
      <div class="indexgrid" id="index"></div>
    </div>

    <div class="right box question">
      <div class="muted" id="chapterLabel"></div>
      <h2 id="prompt">Premi “Avvia” per iniziare.</h2>
      <div id="options"></div>

      <div class="explain" id="explain" style="display:none;">
        <div class="title" id="explainTitle"></div>
        <div id="explainText"></div>
        <div class="muted" id="explainLong" style="margin-top:8px;"></div>
      </div>

      <div class="bar" style="margin-top:10px;">
        <button id="prevBtn">Indietro</button>
        <button id="nextBtn">Avanti</button>
      </div>
    </div>
  </div>

  <div class="box results" id="results" style="display:none;">
    <strong>Risultati</strong>
    <div style="margin-top:8px;" id="resultsBody"></div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
