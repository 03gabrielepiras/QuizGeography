<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Quiz Geografia — UDA 2 (Domande 51–75)</title>
  <style>
    /* Stile "standard" semplice (no animazioni, no blur, no gradienti) */
    body { font-family: Arial, Helvetica, sans-serif; margin:0; padding:0; background:#f2f2f2; color:#111; }
    header { background:#1f3a6b; color:#fff; padding:12px 14px; }
    header h1 { margin:0; font-size:18px; }
    header .sub { margin-top:4px; font-size:12px; opacity:.9; }

    .container { max-width:900px; margin:0 auto; padding:12px; }
    .bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:10px; }
    .box { background:#fff; border:1px solid #ddd; border-radius:8px; padding:10px; }
    .box strong { font-weight:700; }
    button { padding:10px 12px; border:1px solid #999; background:#fff; border-radius:8px; cursor:pointer; }
    button.primary { background:#1f3a6b; color:#fff; border-color:#1f3a6b; }
    button.danger { background:#b42318; color:#fff; border-color:#b42318; }
    button:disabled { opacity:.5; cursor:not-allowed; }

    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .left { flex: 1 1 280px; }
    .right { flex: 2 1 380px; }

    .indexgrid { display:grid; grid-template-columns: repeat(10, 1fr); gap:6px; }
    @media (max-width:520px) { .indexgrid { grid-template-columns: repeat(8, 1fr); } }
    .qbtn { padding:10px 0; border-radius:8px; border:1px solid #bbb; background:#fff; font-weight:700; }
    .qbtn.current { border-color:#1f3a6b; background:#eaf0ff; }
    .qbtn.good { border-color:#1a7f37; background:#e9f7ef; }
    .qbtn.bad { border-color:#b42318; background:#fdecec; }

    .question h2 { margin:0 0 10px; font-size:18px; }
    .opt { display:block; width:100%; text-align:left; margin:8px 0; }
    .opt.good { border-color:#1a7f37; background:#e9f7ef; }
    .opt.bad { border-color:#b42318; background:#fdecec; }

    .explain { margin-top:10px; padding:10px; border:1px dashed #999; background:#fafafa; border-radius:8px; }
    .explain .title { font-weight:700; margin-bottom:6px; }
    .muted { color:#555; font-size:12px; }

    .results { margin-top:14px; }
    .pill { display:inline-block; padding:4px 8px; border:1px solid #ddd; border-radius:999px; background:#fff; font-size:12px; }
  </style>
</head>
<body>
<header>
  <h1>Quiz Geografia — UDA 2 (Domande 51–75)</h1>
  <div class="sub">Demografia · Migrazioni · Città (UDA 2) · 25 domande (51–75)</div>
</header>

<div class="container">
  <div class="bar">
    <div class="pill">Timer: <strong id="timer">00:00</strong></div>
    <div class="pill">Punteggio: <strong id="score">0</strong>/<span id="total">90</span></div>
    <button class="primary" id="startBtn">Avvia</button>
    <button id="finishBtn">Fine & Voto</button>
    <button class="danger" id="restartBtn">Ricomincia</button>
    <button id="modeBtn">Modalità: Allenamento</button>
  </div>

  <div class="row">
    <div class="left box">
      <strong>Indice domande</strong>
      <div class="muted" style="margin:6px 0 8px;">Tocca un numero per andare alla domanda.</div>
      <div class="indexgrid" id="index"></div>
    </div>

    <div class="right box question">
      <div class="muted" id="chapterLabel"></div>
      <h2 id="prompt">Premi “Avvia” per iniziare.</h2>
      <div id="options"></div>

      <div class="explain" id="explain" style="display:none;">
        <div class="title" id="explainTitle"></div>
        <div id="explainText"></div>
        <div class="muted" id="explainLong" style="margin-top:8px;"></div>
      </div>

      <div class="bar" style="margin-top:10px;">
        <button id="prevBtn">Indietro</button>
        <button id="nextBtn">Avanti</button>
      </div>
    </div>
  </div>

  <div class="box results" id="results" style="display:none;">
    <strong>Risultati</strong>
    <div style="margin-top:8px;" id="resultsBody"></div>
  </div>
</div>

<script>
  // No salvataggi: niente localStorage.
  // Anti double-tap zoom (iOS)
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});

  const DATA = JSON.parse(document.getElementById('quiz-data').textContent);
  const CHAPTERS = [
    {label:'⚖️ Stato e legalità', range:[1,10]},
    {label:'👤 Persona e capacità', range:[11,35]},
    {label:'🏛️ Stato e governo', range:[36,60]},
    {label:'🧠 Consolidamento', range:[61,90]},
  ];

  function chapterOf(n){
    for (const c of CHAPTERS) if (n>=c.range[0] && n<=c.range[1]) return c.label;
    return '';
  }

  let mode = 'train'; // train | exam
  let idx = 0;
  let started = false;
  let startEpoch = null;
  let timerHandle = null;
  let answers = new Map(); // number -> {chosen, correct}

  const elTimer = document.getElementById('timer');
  const elScore = document.getElementById('score');
  const elTotal = document.getElementById('total');
  const elIndex = document.getElementById('index');
  const elPrompt = document.getElementById('prompt');
  const elOptions = document.getElementById('options');
  const elExplain = document.getElementById('explain');
  const elExplainTitle = document.getElementById('explainTitle');
  const elExplainText = document.getElementById('explainText');
  const elExplainLong = document.getElementById('explainLong');
  const elChapter = document.getElementById('chapterLabel');
  const elResults = document.getElementById('results');
  const elResultsBody = document.getElementById('resultsBody');

  const startBtn = document.getElementById('startBtn');
  const finishBtn = document.getElementById('finishBtn');
  const restartBtn = document.getElementById('restartBtn');
  const modeBtn = document.getElementById('modeBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  elTotal.textContent = DATA.length;

  function fmtTime(ms){
    const s = Math.floor(ms/1000);
    const m = String(Math.floor(s/60)).padStart(2,'0');
    const r = String(s%60).padStart(2,'0');
    return m+':'+r;
  }

  function updateScore(){
    let ok = 0;
    for (const q of DATA){
      const a = answers.get(q.number);
      if (a && a.chosen && a.correct) ok++;
    }
    elScore.textContent = ok;
  }

  function buildIndex(){
    elIndex.innerHTML = '';
    for (let i=0;i<DATA.length;i++){
      const q = DATA[i];
      const b = document.createElement('button');
      b.className = 'qbtn';
      b.textContent = q.number;
      b.addEventListener('click', ()=>{ idx=i; render(); });
      elIndex.appendChild(b);
    }
    paintIndex();
  }

  function paintIndex(){
    const btns = elIndex.querySelectorAll('.qbtn');
    btns.forEach((b,i)=>{
      b.classList.remove('current','good','bad');
      if (i===idx) b.classList.add('current');
      const q = DATA[i];
      const a = answers.get(q.number);
      if (a && a.chosen) b.classList.add(a.correct ? 'good' : 'bad');
    });
  }

  function render(){
    const q = DATA[idx];
    elChapter.textContent = chapterOf(q.number) + ' · Domanda ' + (idx+1) + '/' + DATA.length;
    elPrompt.textContent = q.prompt;

    elOptions.innerHTML = '';
    elExplain.style.display = 'none';

    const letters = ['A','B','C','D'];
    for (const L of letters){
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.textContent = L + ') ' + q[L];
      btn.disabled = !started;
      btn.addEventListener('click', ()=>answer(L));
      elOptions.appendChild(btn);
    }

    const a = answers.get(q.number);
    if (a && a.chosen){
      lockPaint(q, a);
      if (mode === 'train') showExplain(q, a);
    }

    prevBtn.disabled = !started || idx===0;
    nextBtn.disabled = !started || idx===DATA.length-1;
    paintIndex();
    updateScore();
  }

  function lockPaint(q, a){
    const opts = elOptions.querySelectorAll('.opt');
    opts.forEach(btn=>{
      btn.disabled = true;
      const t = btn.textContent;
      const L = t.trim().charAt(0);
      if (L === q.correct_letter) btn.classList.add('good');
      if (a.chosen === L && !a.correct) btn.classList.add('bad');
    });
  }

  function showExplain(q, a){
    elExplain.style.display = 'block';
    elExplainTitle.textContent = a.correct ? 'Corretto' : 'Sbagliato';
    elExplainText.textContent = a.correct
      ? 'Hai scelto la risposta giusta.'
      : ('Risposta corretta: ' + q.correct_letter + ') ' + q.correct_text);
    elExplainLong.textContent = q.explanation || '';
  }

  function answer(letter){
    if (!started) return;
    const q = DATA[idx];
    if (answers.get(q.number)?.chosen) return;

    const correct = (letter === q.correct_letter);
    answers.set(q.number, { chosen: letter, correct: correct });

    const a = answers.get(q.number);
    lockPaint(q, a);

    if (mode === 'train') showExplain(q, a);

    paintIndex();
    updateScore();

    // In verifica: se è l'ultima domanda, vai ai risultati
    if (mode === 'exam' && idx === DATA.length - 1) {
      finish();
    }
  }

  function start(){
    if (started) return;
    started = true;
    startEpoch = Date.now();
    timerHandle = setInterval(()=>{
      elTimer.textContent = fmtTime(Date.now() - startEpoch);
    }, 250);
    startBtn.disabled = true;
    render();
  }

  function finish(){
    if (!started) return;
    clearInterval(timerHandle);
    timerHandle = null;
    started = false;
    startBtn.disabled = false;

    const total = DATA.length;
    let ok = 0;
    for (const q of DATA){
      const a = answers.get(q.number);
      if (a && a.chosen && a.correct) ok++;
    }
    const voto = Math.round(((ok/total)*10)*2)/2;

    // Stats per capitolo
    function statRange(a,b){
      const qs = DATA.filter(q=>q.number>=a && q.number<=b);
      let done=0, good=0;
      for (const q of qs){
        const an = answers.get(q.number);
        if (an && an.chosen) { done++; if (an.correct) good++; }
      }
      const pct = done ? Math.round((good/done)*100) : 0;
      return {done, good, pct};
    }
    const s1 = statRange(1,10);
    const s2 = statRange(11,35);
    const s3 = statRange(36,60);
    const s4 = statRange(61,90);

    const worst = [{name:'Stato e legalità', p:s1.pct},{name:'Persona e capacità', p:s2.pct},{name:'Stato e governo', p:s3.pct},{name:'Consolidamento', p:s4.pct}]
      .filter(x=>x.p>0 || true).sort((x,y)=>x.p-y.p)[0];

    elResults.style.display = 'block';
    elResultsBody.innerHTML =
      '<div><strong>Punteggio:</strong> '+ok+'/'+total+'</div>' +
      '<div><strong>Voto (stima):</strong> '+voto+'/10</div>' +
      '<div><strong>Tempo:</strong> '+elTimer.textContent+'</div>' +
      '<hr>' +
      '<div><strong>Statistiche per capitolo:</strong></div>' +
      '<div>⚖️ Stato e legalità: '+s1.pct+'% (Corrette '+s1.good+'/'+s1.done+')</div>' +
      '<div>👤 Persona e capacità: '+s2.pct+'% (Corrette '+s2.good+'/'+s2.done+')</div>' +
      '<div>🏛️ Stato e governo: '+s3.pct+'% (Corrette '+s3.good+'/'+s3.done+')</div>' +
      '<div>🧠 Consolidamento: '+s4.pct+'% (Corrette '+s4.good+'/'+s4.done+')</div>' +
      '<hr>' +
      '<div><strong>Consiglio:</strong> Rivedi prima '+worst.name+' (accuratezza '+worst.p+'%).</div>';

    elResults.scrollIntoView();
  }

  function restart(){
    // reset totale senza salvataggi
    clearInterval(timerHandle);
    timerHandle = null;
    started = false;
    answers = new Map();
    idx = 0;
    elTimer.textContent = '00:00';
    elResults.style.display = 'none';
    startBtn.disabled = false;
    render();
  }

  function toggleMode(){
    mode = (mode === 'train') ? 'exam' : 'train';
    modeBtn.textContent = 'Modalità: ' + (mode === 'train' ? 'Allenamento' : 'Verifica');
    // In verifica nascondi spiegazione
    elExplain.style.display = 'none';
    render();
  }

  startBtn.addEventListener('click', start);
  finishBtn.addEventListener('click', finish);
  restartBtn.addEventListener('click', restart);
  modeBtn.addEventListener('click', toggleMode);
  prevBtn.addEventListener('click', ()=>{ if(idx>0) { idx--; render(); } });
  nextBtn.addEventListener('click', ()=>{ if(idx<DATA.length-1) { idx++; render(); } });

  buildIndex();
  render();
</script>
</body>
</html>
